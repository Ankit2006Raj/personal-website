    <!-- Certificate Modal -->
    <div id="certModal" class="modal">
        <div class="modal-overlay" onclick="closeCertModal()"></div>
        <div class="modal-content cert-modal-content">
            <button class="modal-close" onclick="closeCertModal()" aria-label="Close modal">
                <i class="fas fa-times"></i>
            </button>
            <div class="cert-modal-actions cert-modal-actions-top">
                <button class="btn btn-secondary" onclick="closeCertModal()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <a id="certDownloadBtn" href="" download class="btn btn-primary">
                    <i class="fas fa-download"></i> Download Certificate
                </a>
            </div>
            <div class="modal-body">
                <img id="certModalImage" src="" alt="Certificate" class="cert-modal-img">
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-overlay" onclick="closeProjectModal()"></div>
        <div class="modal-content project-modal-content">
            <button class="modal-close" onclick="closeProjectModal()" aria-label="Close modal">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-body" id="projectModalBody">
                <!-- Project details will be injected here -->
            </div>
        </div>
